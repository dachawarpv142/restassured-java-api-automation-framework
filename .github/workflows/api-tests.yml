name: API Tests

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (dev|qa|prod)"
        required: true
        default: "qa"
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, qa, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run API tests
        run: mvn -B clean test -Denv=${{ github.event.inputs.env || matrix.env }}

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.event.inputs.env || matrix.env }}
          path: target/allure-results

